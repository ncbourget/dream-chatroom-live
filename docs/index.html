<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta
		name="viewport"
		content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
	/>
	<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
	<meta http-equiv="Pragma" content="no-cache" />
	<meta http-equiv="Expires" content="0" />
	<title>dreambox</title>

	<style>
		html, body {
			margin: 0;
			padding: 0;
			width: 100%;
			height: 100%;
			background: #111;
			overflow: hidden;
			font-family: Arial, Helvetica, sans-serif;
		}

		#canvas {
			width: 100%;
			height: 100%;
			display: block;
		}

		#godot-face-video,
		#godot-face-canvas,
		#godot-image-input,
		#image-convert-canvas {
			display: none;
		}

		/* ========================= */
		/* SHARED PANEL OVERLAY FEEL */
		/* ========================= */

		.overlay-backdrop {
			position: fixed;
			inset: 0;
			z-index: 20;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
			box-sizing: border-box;
			background: rgba(17, 17, 17, 0.82);
			backdrop-filter: blur(4px);
		}

		.mobile-panel {
			width: min(92vw, 420px);
			max-height: min(88vh, 900px);
			background: rgba(20, 20, 20, 0.92);
			border: 1px solid rgba(255, 255, 255, 0.12);
			padding: 18px;
			box-sizing: border-box;
			color: white;
			overflow-y: auto;
			overflow-x: hidden;
		}

		/* ========================= */
		/* ENTRY OVERLAY */
		/* ========================= */

		#entry-overlay {
			position: fixed;
			inset: 0;
			z-index: 20;
			display: flex;
			align-items: center;
			justify-content: center;
			padding: 20px;
			box-sizing: border-box;
			background: rgba(17, 17, 17, 0.82);
			backdrop-filter: blur(4px);
		}

		#entry-panel {
			width: min(92vw, 420px);
			background: rgba(30, 30, 30, 0.88);
			border: 1px solid rgba(255, 255, 255, 0.08);
			padding: 18px;
			box-sizing: border-box;
			color: white;
		}

		#entry-title {
			font-size: clamp(28px, 6vw, 42px);
			line-height: 1;
			margin: 0 0 8px 0;
			text-align: center;
		}

		#entry-subtitle {
			font-size: 13px;
			opacity: 0.8;
			text-align: center;
			margin-bottom: 16px;
		}

		.entry-field {
			width: 100%;
			box-sizing: border-box;
			margin-bottom: 10px;
		}

		#name-input,
		#pick-image-button,
		#start-button {
			width: 100%;
			min-height: 48px;
			box-sizing: border-box;
			border: 1px solid rgba(255,255,255,0.15);
			background: rgba(0,0,0,0.25);
			color: white;
			padding: 12px;
			font-size: 16px;
			border-radius: 0;
			outline: none;
		}

		#name-input::placeholder {
			color: rgba(255,255,255,0.45);
		}

		#pick-image-button,
		#start-button {
			cursor: pointer;
		}

		#start-button:disabled {
			opacity: 0.45;
			cursor: default;
		}

		#file-name {
			font-size: 13px;
			opacity: 0.9;
			margin: 0 0 10px 0;
			min-height: 18px;
			word-break: break-word;
		}

		#facecam-row {
			display: flex;
			align-items: center;
			gap: 8px;
			font-size: 14px;
			margin-bottom: 12px;
		}

		#preview-wrap {
			width: 100%;
			aspect-ratio: 1 / 1;
			background: rgba(255,255,255,0.04);
			border: 1px solid rgba(255,255,255,0.08);
			margin-bottom: 12px;
			display: flex;
			align-items: center;
			justify-content: center;
			overflow: hidden;
		}

		#preview-image {
			width: 100%;
			height: 100%;
			object-fit: contain;
			display: none;
			background: #111;
		}

		#status-text {
			font-size: 13px;
			min-height: 18px;
			opacity: 0.9;
			margin-top: 10px;
		}

		/* ========================= */
		/* GUESTBOOK OVERLAY */
		/* ========================= */

		#guestbook {
			position: fixed;
			inset: 0;
			display: none;
			z-index: 9999;
			background: rgba(0, 0, 0, 0.82);
			backdrop-filter: blur(4px);
		}

		#guestbook .guestbook-panel {
			width: min(92vw, 420px);
			max-height: min(88vh, 900px);
			background: rgba(20, 20, 20, 0.92);
			border: 1px solid rgba(255, 255, 255, 0.12);
			padding: 18px;
			box-sizing: border-box;
			color: white;
			overflow-y: auto;
			overflow-x: hidden;
		}

		.guestbook-topbar {
			display: flex;
			justify-content: space-between;
			align-items: flex-start;
			gap: 12px;
			margin-bottom: 18px;
		}

		.guestbook-title {
			font-size: clamp(28px, 6vw, 42px);
			line-height: 1;
			font-weight: 700;
			margin: 0;
		}

		#closeGuestbook {
			appearance: none;
			border: 1px solid rgba(255,255,255,0.16);
			background: white;
			color: black;
			padding: 10px 16px;
			font-size: 14px;
			cursor: pointer;
			flex: 0 0 auto;
		}

		#entries {
			display: grid;
			grid-template-columns: repeat(2, minmax(0, 1fr));
			column-gap: 16px;
			row-gap: 24px;
			align-content: start;
		}

		.entry {
			border: 1px solid rgba(255,255,255,0.20);
			padding: 12px;
			display: flex;
			flex-direction: column;
			gap: 12px;
			background: rgba(255,255,255,0.03);
			min-width: 0;
		}

		.entry-thumb {
			width: 100%;
			aspect-ratio: 1 / 1;
			overflow: hidden;
			background: #111;
			display: flex;
			align-items: center;
			justify-content: center;
			border: 1px solid rgba(255,255,255,0.06);
		}

		.entry-thumb img {
			width: 100%;
			height: 100%;
			display: block;
			object-fit: contain;
			background: #111;
		}

		.entry-name {
			font-size: 15px;
			font-weight: 700;
			line-height: 1.08;
			word-break: break-word;
		}

		.entry-date {
			font-size: 12px;
			opacity: 0.8;
			line-height: 1.35;
			word-break: break-word;
		}

		.pagination {
			display: flex;
			justify-content: center;
			align-items: center;
			gap: 12px;
			padding-top: 18px;
		}

		.pagination button {
			appearance: none;
			border: 1px solid white;
			background: transparent;
			color: white;
			padding: 8px 14px;
			font-size: 14px;
			cursor: pointer;
		}

		.pagination button:disabled {
			opacity: 0.3;
			cursor: default;
		}

		#pageLabel {
			min-width: 110px;
			text-align: center;
			font-size: 14px;
		}

		#guestbookStatus {
			text-align: center;
			font-size: 14px;
			opacity: 0.75;
			min-height: 18px;
			padding-top: 12px;
		}

		@media (max-width: 520px) {
			#entry-overlay,
			#guestbook {
				padding: 16px;
			}

			#entry-panel,
			#guestbook .guestbook-panel {
				width: min(92vw, 420px);
				padding: 16px;
			}

			.guestbook-topbar {
				margin-bottom: 16px;
			}

			#entries {
				column-gap: 16px;
				row-gap: 28px;
			}
		}
	</style>
</head>
<body>
	<div id="entry-overlay">
		<div id="entry-panel">
			<h1 id="entry-title">choose your shirt</h1>
			<div id="entry-subtitle">build v18 guestbook-panel-match</div>

			<input
				id="name-input"
				class="entry-field"
				type="text"
				placeholder="enter name"
				autocomplete="off"
				autocapitalize="none"
				autocorrect="off"
				spellcheck="false"
			/>

			<div id="preview-wrap">
				<img id="preview-image" alt="shirt preview" />
			</div>

			<div id="file-name">no image selected</div>

			<button id="pick-image-button" class="entry-field" type="button">select image</button>

			<label id="facecam-row">
				<input id="facecam-checkbox" type="checkbox" />
				<span>enable facecam</span>
			</label>

			<button id="start-button" class="entry-field" type="button">enter world</button>

			<div id="status-text">enter a name and select an image</div>
		</div>
	</div>

	<div id="guestbook" class="overlay-backdrop">
		<div class="guestbook-panel mobile-panel">
			<div class="guestbook-topbar">
				<div class="guestbook-title">Guestbook</div>
				<button id="closeGuestbook" type="button">Close</button>
			</div>

			<div id="entries"></div>

			<div class="pagination">
				<button id="prevPage" type="button">Prev</button>
				<span id="pageLabel">Page 1 / 1</span>
				<button id="nextPage" type="button">Next</button>
			</div>

			<div id="guestbookStatus"></div>
		</div>
	</div>

	<input id="godot-image-input" type="file" accept="image/*" />

	<canvas id="canvas">
		Your browser does not support the canvas tag.
	</canvas>

	<video id="godot-face-video" autoplay playsinline muted></video>
	<canvas id="godot-face-canvas"></canvas>
	<canvas id="image-convert-canvas"></canvas>

	<script>
		const BUILD_TAG = "v18-guestbook-panel-match";
		const GUESTBOOK_API_BASE = "https://dream-chatroom.onrender.com";

		const overlay = document.getElementById("entry-overlay");
		const nameInput = document.getElementById("name-input");
		const pickImageButton = document.getElementById("pick-image-button");
		const startButton = document.getElementById("start-button");
		const facecamCheckbox = document.getElementById("facecam-checkbox");
		const fileName = document.getElementById("file-name");
		const statusText = document.getElementById("status-text");
		const previewImage = document.getElementById("preview-image");

		const godotImageInput = document.getElementById("godot-image-input");
		const godotFaceVideo = document.getElementById("godot-face-video");
		const godotFaceCanvas = document.getElementById("godot-face-canvas");
		const godotFaceCtx = godotFaceCanvas.getContext("2d", { willReadFrequently: true });
		const imageConvertCanvas = document.getElementById("image-convert-canvas");
		const imageConvertCtx = imageConvertCanvas.getContext("2d");

		let godotFaceStream = null;
		let godotFaceSize = 80;
		let selectedImageDataUrl = "";
		let selectedImageName = "";

		let currentPage = 1;
		let totalPages = 1;
		window.lastMessage = "";

		function updateStartState() {
			const hasName = nameInput.value.trim().length > 0;
			const hasImage = selectedImageDataUrl !== "";

			startButton.disabled = !(hasName && hasImage);

			if (hasName && hasImage) {
				statusText.textContent = "ready";
			} else if (!hasName && !hasImage) {
				statusText.textContent = "enter a name and select an image";
			} else if (!hasName) {
				statusText.textContent = "enter a name";
			} else {
				statusText.textContent = "select an image";
			}
		}

		async function convertFileToJpegDataUrl(file) {
			return new Promise((resolve, reject) => {
				const objectUrl = URL.createObjectURL(file);
				const img = new Image();

				img.onload = () => {
					try {
						const maxSize = 128;
						imageConvertCanvas.width = maxSize;
						imageConvertCanvas.height = maxSize;

						imageConvertCtx.clearRect(0, 0, maxSize, maxSize);

						const srcW = img.naturalWidth || img.width;
						const srcH = img.naturalHeight || img.height;
						const square = Math.min(srcW, srcH);
						const sx = Math.floor((srcW - square) * 0.5);
						const sy = Math.floor((srcH - square) * 0.5);

						imageConvertCtx.drawImage(
							img,
							sx, sy, square, square,
							0, 0, maxSize, maxSize
						);

						const jpegDataUrl = imageConvertCanvas.toDataURL("image/jpeg", 0.72);
						URL.revokeObjectURL(objectUrl);
						resolve(jpegDataUrl);
					} catch (err) {
						URL.revokeObjectURL(objectUrl);
						reject(err);
					}
				};

				img.onerror = (err) => {
					URL.revokeObjectURL(objectUrl);
					reject(err);
				};

				img.src = objectUrl;
			});
		}

		function formatJoinedAt(timestamp) {
			const date = new Date(timestamp);
			return date.toLocaleString();
		}

		function setGuestbookStatus(text) {
			document.getElementById("guestbookStatus").textContent = text || "";
		}

		function renderGuestbookEntries(data) {
			const container = document.getElementById("entries");
			container.innerHTML = "";

			if (!data.entries || data.entries.length === 0) {
				setGuestbookStatus("No entries yet.");
			} else {
				setGuestbookStatus("");
			}

			for (const entry of data.entries) {
				const div = document.createElement("div");
				div.className = "entry";

				div.innerHTML = `
					<div class="entry-thumb">
						<img src="${entry.shirt_url}" alt="${entry.name}" loading="lazy">
					</div>
					<div class="entry-name">${entry.name}</div>
					<div class="entry-date">${formatJoinedAt(entry.joined_at)}</div>
				`;

				container.appendChild(div);
			}
		}

		function updatePaginationUI() {
			document.getElementById("pageLabel").textContent = `Page ${currentPage} / ${totalPages}`;
			document.getElementById("prevPage").disabled = currentPage <= 1;
			document.getElementById("nextPage").disabled = currentPage >= totalPages;
		}

		async function loadGuestbook(page = 1) {
			try {
				setGuestbookStatus("Loading...");
				const res = await fetch(`${GUESTBOOK_API_BASE}/api/guestbook?page=${page}`, {
					cache: "no-store"
				});

				if (!res.ok) {
					throw new Error(`HTTP ${res.status}`);
				}

				const data = await res.json();

				currentPage = Number(data.page || 1);
				totalPages = Math.max(1, Number(data.total_pages || 1));

				renderGuestbookEntries(data);
				updatePaginationUI();
			} catch (err) {
				console.error("Guestbook fetch failed:", err);
				document.getElementById("entries").innerHTML = "";
				setGuestbookStatus("Could not load guestbook.");
				currentPage = 1;
				totalPages = 1;
				updatePaginationUI();
			}
		}

		function showGuestbook() {
			document.getElementById("guestbook").style.display = "flex";
			window.lastMessage = "";
			loadGuestbook(1);
		}

		function hideGuestbook() {
			document.getElementById("guestbook").style.display = "none";
			window.lastMessage = "guestbook_closed";
		}

		window.showGuestbook = showGuestbook;
		window.hideGuestbook = hideGuestbook;

		window.openGodotImagePicker = function () {
			godotImageInput.value = "";
			godotImageInput.click();
		};

		pickImageButton.addEventListener("click", function () {
			window.openGodotImagePicker();
		});

		godotImageInput.addEventListener("change", async function () {
			const file = godotImageInput.files && godotImageInput.files[0];
			if (!file) return;

			try {
				const jpegDataUrl = await convertFileToJpegDataUrl(file);

				selectedImageDataUrl = jpegDataUrl;
				selectedImageName = file.name || "image.jpg";

				fileName.textContent = selectedImageName;
				previewImage.src = selectedImageDataUrl;
				previewImage.style.display = "block";

				updateStartState();
			} catch (err) {
				console.error("[dreambox]", BUILD_TAG, "Image conversion failed:", err);
				selectedImageDataUrl = "";
				selectedImageName = "";
				fileName.textContent = "no image selected";
				previewImage.src = "";
				previewImage.style.display = "none";
				statusText.textContent = "could not load image";
				updateStartState();
			}
		});

		nameInput.addEventListener("input", updateStartState);

		function invokeGodotStart() {
			const name = nameInput.value.trim();
			if (!name || !selectedImageDataUrl) {
				updateStartState();
				return;
			}

			if (window.godotWebStart) {
				window.godotWebStart(name, selectedImageDataUrl, facecamCheckbox.checked);
				overlay.style.display = "none";
			}
		}

		startButton.addEventListener("click", invokeGodotStart);

		window.startGodotFacecam = async function (width, height) {
			try {
				godotFaceSize = Math.max(32, width || 80);

				if (godotFaceStream) {
					godotFaceStream.getTracks().forEach(track => track.stop());
					godotFaceStream = null;
				}

				const stream = await navigator.mediaDevices.getUserMedia({
					video: {
						facingMode: "user",
						width: { ideal: 192 },
						height: { ideal: 192 },
						frameRate: { ideal: 8, max: 12 }
					},
					audio: false
				});

				godotFaceStream = stream;
				godotFaceVideo.srcObject = stream;
				await godotFaceVideo.play();

				godotFaceCanvas.width = godotFaceSize;
				godotFaceCanvas.height = godotFaceSize;
			} catch (err) {
				console.error("[dreambox]", BUILD_TAG, "Godot facecam failed:", err);
			}
		};

		window.captureGodotFacecamFrame = function () {
			if (!godotFaceVideo || !godotFaceStream) return "";
			if (godotFaceVideo.videoWidth === 0 || godotFaceVideo.videoHeight === 0) return "";

			const vw = godotFaceVideo.videoWidth;
			const vh = godotFaceVideo.videoHeight;
			const square = Math.min(vw, vh);
			const sx = Math.floor((vw - square) * 0.5);
			const sy = Math.floor((vh - square) * 0.5);

			godotFaceCtx.clearRect(0, 0, godotFaceSize, godotFaceSize);
			godotFaceCtx.drawImage(
				godotFaceVideo,
				sx, sy, square, square,
				0, 0, godotFaceSize, godotFaceSize
			);

			return godotFaceCanvas.toDataURL("image/jpeg", 0.45);
		};

		window.stopGodotFacecam = function () {
			if (godotFaceStream) {
				godotFaceStream.getTracks().forEach(track => track.stop());
				godotFaceStream = null;
			}

			if (godotFaceVideo) {
				godotFaceVideo.srcObject = null;
			}
		};

		document.getElementById("closeGuestbook").addEventListener("click", hideGuestbook);

		document.getElementById("prevPage").addEventListener("click", () => {
			if (currentPage > 1) {
				loadGuestbook(currentPage - 1);
			}
		});

		document.getElementById("nextPage").addEventListener("click", () => {
			if (currentPage < totalPages) {
				loadGuestbook(currentPage + 1);
			}
		});

		updateStartState();
		updatePaginationUI();

		(function () {
			function patchAudioWorklet(ContextClass) {
				if (!ContextClass || !ContextClass.prototype) return;

				const proto = ContextClass.prototype;

				if (!("audioWorklet" in proto)) {
					Object.defineProperty(proto, "audioWorklet", {
						configurable: true,
						get() {
							return {
								addModule: async function () {
									return Promise.resolve();
								}
							};
						}
					});
				}
			}

			patchAudioWorklet(window.AudioContext);
			patchAudioWorklet(window.webkitAudioContext);

			if (typeof window.AudioWorkletNode === "undefined") {
				window.AudioWorkletNode = class AudioWorkletNode {
					constructor() {}
					connect() { return this; }
					disconnect() {}
					port = { postMessage() {}, onmessage: null };
				};
			}

			if (typeof window.AudioWorkletProcessor === "undefined") {
				window.AudioWorkletProcessor = class AudioWorkletProcessor {
					constructor() {
						this.port = { postMessage() {}, onmessage: null };
					}
					process() { return true; }
				};
			}

			if (typeof window.registerProcessor === "undefined") {
				window.registerProcessor = function () {};
			}
		})();
	</script>

	<link id="-gd-engine-icon" rel="icon" type="image/png" href="index.icon.png" />
<link rel="apple-touch-icon" href="index.apple-touch-icon.png"/>


	<script src="index.js?v=18"></script>
	<script>
		const engine = new Engine({"args":[],"canvasResizePolicy":2,"emscriptenPoolSize":8,"ensureCrossOriginIsolationHeaders":true,"executable":"index","experimentalVK":false,"fileSizes":{"index.pck":13982012,"index.wasm":35739700},"focusCanvas":true,"gdextensionLibs":[],"godotPoolSize":4});
		engine.startGame({
			canvas: document.getElementById("canvas")
		});
	</script>
</body>
</html>
