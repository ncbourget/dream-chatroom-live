<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover" />
  <title>Dream Chatroom</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
      font-family: Arial, Helvetica, sans-serif;
    }

    #godotFrame {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      z-index: 1;
      background: black;
    }

    #guestbook {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.96);
      color: white;
      overflow: hidden;
    }

    .guestbook-container {
      width: 100%;
      height: 100%;
      box-sizing: border-box;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .guestbook-topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .guestbook-title {
      font-size: clamp(24px, 3vw, 40px);
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    #closeGuestbook {
      appearance: none;
      border: 1px solid white;
      background: white;
      color: black;
      padding: 10px 16px;
      font-size: 14px;
      cursor: pointer;
    }

    #entries {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      align-content: start;
      overflow: hidden;
    }

    .entry {
      border: 1px solid rgba(255,255,255,0.35);
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
      background: rgba(255,255,255,0.03);
    }

    .entry img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      display: block;
      background: #111;
    }

    .entry-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.1;
      word-break: break-word;
    }

    .entry-date {
      font-size: 13px;
      opacity: 0.8;
      line-height: 1.3;
    }

    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 12px;
      padding-top: 4px;
    }

    .pagination button {
      appearance: none;
      border: 1px solid white;
      background: transparent;
      color: white;
      padding: 8px 14px;
      font-size: 14px;
      cursor: pointer;
    }

    .pagination button:disabled {
      opacity: 0.3;
      cursor: default;
    }

    #pageLabel {
      min-width: 110px;
      text-align: center;
      font-size: 14px;
    }

    #guestbookStatus {
      text-align: center;
      font-size: 14px;
      opacity: 0.75;
      min-height: 18px;
    }

    @media (max-width: 900px) {
      .guestbook-container {
        padding: 16px;
      }

      #entries {
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .entry-name {
        font-size: 15px;
      }

      .entry-date {
        font-size: 12px;
      }
    }

    @media (max-width: 640px) {
      #entries {
        grid-template-columns: 1fr 1fr;
      }

      .guestbook-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <iframe
    id="godotFrame"
    src="./godot/index.html"
    allow="camera; microphone; autoplay; fullscreen"
  ></iframe>

  <div id="guestbook">
    <div class="guestbook-container">
      <div class="guestbook-topbar">
        <div class="guestbook-title">Guestbook</div>
        <button id="closeGuestbook" type="button">Close</button>
      </div>

      <div id="entries"></div>

      <div class="pagination">
        <button id="prevPage" type="button">Prev</button>
        <span id="pageLabel">Page 1 / 1</span>
        <button id="nextPage" type="button">Next</button>
      </div>

      <div id="guestbookStatus"></div>
    </div>
  </div>

  <script>
    const GUESTBOOK_API_BASE = "https://dream-chatroom.onrender.com";

    let currentPage = 1;
    let totalPages = 1;
    window.lastMessage = "";

    function formatJoinedAt(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleString();
    }

    function setGuestbookStatus(text) {
      document.getElementById("guestbookStatus").textContent = text || "";
    }

    function renderGuestbookEntries(data) {
      const container = document.getElementById("entries");
      container.innerHTML = "";

      if (!data.entries || data.entries.length === 0) {
        setGuestbookStatus("No entries yet.");
      } else {
        setGuestbookStatus("");
      }

      for (const entry of data.entries) {
        const div = document.createElement("div");
        div.className = "entry";

        div.innerHTML = `
          <img src="${entry.shirt_url}" alt="${entry.name}" loading="lazy">
          <div class="entry-name">${entry.name}</div>
          <div class="entry-date">${formatJoinedAt(entry.joined_at)}</div>
        `;

        container.appendChild(div);
      }

      while (container.children.length < 8) {
        const filler = document.createElement("div");
        filler.className = "entry";
        filler.style.visibility = "hidden";
        container.appendChild(filler);
      }
    }

    function updatePaginationUI() {
      document.getElementById("pageLabel").textContent = `Page ${currentPage} / ${totalPages}`;
      document.getElementById("prevPage").disabled = currentPage <= 1;
      document.getElementById("nextPage").disabled = currentPage >= totalPages;
    }

    async function loadGuestbook(page = 1) {
      try {
        setGuestbookStatus("Loading...");
        const res = await fetch(`${GUESTBOOK_API_BASE}/api/guestbook?page=${page}`, {
          cache: "no-store"
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();

        currentPage = Number(data.page || 1);
        totalPages = Math.max(1, Number(data.total_pages || 1));

        renderGuestbookEntries(data);
        updatePaginationUI();
      } catch (err) {
        console.error("Guestbook fetch failed:", err);
        document.getElementById("entries").innerHTML = "";
        setGuestbookStatus("Could not load guestbook.");
        currentPage = 1;
        totalPages = 1;
        updatePaginationUI();
      }
    }

    function showGuestbook() {
      const guestbook = document.getElementById("guestbook");
      guestbook.style.display = "block";
      window.lastMessage = "";
      loadGuestbook(1);
    }

    function hideGuestbook() {
      document.getElementById("guestbook").style.display = "none";
      window.lastMessage = "guestbook_closed";
    }

    window.showGuestbook = showGuestbook;
    window.hideGuestbook = hideGuestbook;

    document.getElementById("closeGuestbook").addEventListener("click", hideGuestbook);

    document.getElementById("prevPage").addEventListener("click", () => {
      if (currentPage > 1) {
        loadGuestbook(currentPage - 1);
      }
    });

    document.getElementById("nextPage").addEventListener("click", () => {
      if (currentPage < totalPages) {
        loadGuestbook(currentPage + 1);
      }
    });

    updatePaginationUI();
  </script>
</body>
</html>
